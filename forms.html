<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form</title>
</head>

<body>
  <form>
  
<fieldset>
  <legend><h1>Student Registration Form</h1></legend>
  <h4>PERSONAL INFORMATION</h4>
  
  <p>
    <label for="first-name">first Name:</label> <br>
    <input type="text" name="First-name" id="First-name" placeholder="Enter First Name"> <br>
    
  </p>
    <p>
    <label for="Middle Name">middle Name:</label> <br>
    <input type="text" name="Middle-name" id="Middle-name" placeholder="Enter middle Name"> <br>
    
  </p>
    <p>
    <label for="Last Name">Last Name:</label> <br>
    <input type="text" name="Last-name" id="last-name" placeholder="Enter Last Name"> <br>
    
  </p>
  <p> 
    <label for="CONTACT DETAILS:">CONTACT  DETAILS</label>
  </p>
    <p>
    <label for="Email">Email:</label> <br>
    <input type="text" name="Email" id="Email" placeholder="example @mail.com"> <br>
      <p>
    <label for="Phone">Phone:</label> <br>
    <input type="number" name="Phone" id="Phone" placeholder="enter phone"> <br>
    <p>SECURITY:</p>
      <p>
    <label for="Password">Password:</label><br>
      
      <input type="password" name="password" id="password" value="6" /> <br>
      <p>GENDER:</p>
      <input type="radio" name="male" id="male"> 
      <label for="male">male</label><br>
      <input type="radio" name="female" id="female">
      <label for="Female">Female</label><br>
      
     <p>FAVORITE COURSE:</p>
           <input type="checkbox" name="Html" id="Html">
      <label for="HTML">HTML</label><br>
            <input type="checkbox" name="Math" id="math">
      <label for="MATH">MATH</label><br>
      <p>ACTIONS:</p>
      <input type="submit" name="save data" id="save data">
      <input type="reset" name="clear form" id="clear form">

     
     
     
      
        
   
    
    
  </p>
  

    
  </p>
  
    
  </p>
  
    
  </p>
  
  
  
  
  
</fieldset>
   
 
  </form>
</body>

</html>
